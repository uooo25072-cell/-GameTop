<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sbg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#3a4a64"/>
      <stop offset="100%" stop-color="#0d111c"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#sbg)"/>
  <g transform="translate(256 256)">
    <!-- Outer ring -->
    <circle r="120" fill="none" stroke="#fff" stroke-width="14" opacity="0.95"/>
    <!-- Inner piston -->
    <circle r="60" fill="none" stroke="#fff" stroke-width="10"/>
    <!-- Piston arm -->
    <path d="M 60 0 L 150 0" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <circle cx="160" cy="0" r="14" fill="#fff"/>
  </g>
  <text x="256" y="430" text-anchor="middle" font-family="Orbitron, sans-serif" font-weight="900" font-size="56" fill="#fff">STEAM</text>
</svg>